services:
  - type: web
    name: physician-locator-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: MAPQUEST_API_KEY
        sync: false
      - key: GEOAPIFY_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"