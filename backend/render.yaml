services:
  - type: web
    name: physician-locator-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class gthread --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MAPQUEST_API_KEY
        sync: false
      - key: GEOAPIFY_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SF_OID
        sync: false
      - key: SF_RET_URL
        sync: false
      - key: SF_DEBUG_EMAIL
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: DEBUG_SECRET
        sync: false
      - key: LEADS_DIR
        sync: false