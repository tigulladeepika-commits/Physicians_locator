services:
  - type: web
    name: physician-locator-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # ── Worker config ────────────────────────────────────────────────────────
    # gthread  : each worker handles multiple requests concurrently via threads
    # workers 2: two processes → survives one worker being busy with a slow NPPES call
    # threads 8: 8 concurrent Geoapify/NPPES calls per worker without blocking
    # timeout 25: must be < Render's 30 s proxy deadline; app-level timeouts
    #             (AC_TIMEOUT=8s, REQUEST_TIMEOUT=25s) fire first
    # keep-alive 5: reuse connections from Vercel edge → fewer TCP handshakes
    startCommand: gunicorn app:app --worker-class gthread --workers 2 --threads 8 --timeout 25 --keep-alive 5 --bind 0.0.0.0:$PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MAPQUEST_API_KEY
        sync: false
      - key: GEOAPIFY_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SF_OID
        sync: false
      - key: SF_RET_URL
        sync: false
      - key: SF_DEBUG_EMAIL
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: DEBUG_SECRET
        sync: false
      - key: LEADS_DIR
        sync: false